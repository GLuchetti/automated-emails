// -------------------------------------------------------
// Stats
// -------------------------------------------------------
function renderStats() {
  const bar = document.getElementById('stats-bar');
  let totalRuns = RUNS.length;
  let totalCalls = 0, totalSent = 0, totalErrors = 0, totalNoContact = 0;
  RUNS.forEach(r => {
    totalCalls += (r.calls_processed || []).length;
    (r.calls_processed || []).forEach(c => {
      if (c.status === 'sent') totalSent++;
      else if (c.status === 'error') totalErrors++;
      else if (c.status === 'no_contact') totalNoContact++;
    });
  });
  const stats = [
    { value: totalRuns, label: 'Total Runs' },
    { value: totalCalls, label: 'Calls Processed' },
    { value: totalSent, label: 'Emails Sent' },
    { value: totalNoContact, label: 'Missing Contacts' },
    { value: totalErrors, label: 'Errors' },
  ];
  bar.innerHTML = stats.map(s =>
    `<div class="stat"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`
  ).join('');
}

// -------------------------------------------------------
// Format helpers
// -------------------------------------------------------
function fmtTime(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: 'numeric', minute: '2-digit', timeZoneName: 'short' });
  } catch(e) { return iso; }
}

function statusBadge(status) {
  const map = { sent: ['badge-sent','Sent'], dashboard: ['badge-dashboard','Draft Ready'], error: ['badge-error','Error'], no_contact: ['badge-no-contact','No Contact'] };
  const [cls, label] = map[status] || ['badge-gray', status];
  return `<span class="status-badge ${cls}">${label}</span>`;
}

function teamBadge(team) {
  return team === 'sales'
    ? `<span class="team-badge badge-sales">Sales</span>`
    : `<span class="team-badge badge-support">Support</span>`;
}

function runDotClass(run) {
  const calls = run.calls_processed || [];
  if (calls.length === 0) return 'dot-empty';
  if (calls.some(c => c.status === 'error')) return 'dot-error';
  if (calls.some(c => c.status === 'sent')) return 'dot-success';
  return 'dot-empty';
}

// -------------------------------------------------------
// Email preview toggle
// -------------------------------------------------------
function toggleEmailPreview(btn, previewId) {
  const preview = document.getElementById(previewId);
  const isOpen = preview.classList.contains('open');
  preview.classList.toggle('open', !isOpen);
  btn.innerHTML = isOpen
    ? '&#9993; View Email Draft'
    : '&#8593; Hide Email Draft';
}

          </div>
        </div>
        <div class="email-preview-body" id="draft-text-${runId}-${idx}">${call.email_html}</div>
      </div>`;
  }

  const errorHtml = (call.status !== 'sent' && call.error)
    ? `<div class="call-error">⚠️ ${call.error}</div>` : '';

  return `
    <div class="call-row">
      <div class="call-top">
        <div class="call-info">
          <div class="call-name">${call.call_name || 'Unknown Call'}</div>
          <div class="call-detail">
            ${recipients.map(r => `<span>${r}</span>`).join('')}
            <span>&#128337; ${fmtTime(call.timestamp)}</span>
          </div>
          ${errorHtml}
          ${emailPreviewHtml}
        </div>
        <div class="call-right">
          ${teamBadge(call.team)}
          ${statusBadge(call.status)}
        </div>
      </div>
    </div>`;
}

// -------------------------------------------------------
// Render a single run card
// -------------------------------------------------------
function renderRun(run, idx) {
  const calls = run.calls_processed || [];
  const sentCount = calls.filter(c => c.status === 'sent').length;
  const errCount = calls.filter(c => c.status !== 'sent').length;
  const dotClass = runDotClass(run);
  const runId = run.id || idx;
  const bodyId = `run-body-${runId}`;
  const chevronId = `chevron-${runId}`;

  const pills = [];
  if (calls.length > 0) pills.push(`<span class="pill pill-blue">${calls.length} call${calls.length !== 1 ? 's' : ''}</span>`);
  if (sentCount > 0) pills.push(`<span class="pill pill-green">&#10003; ${sentCount} sent</span>`);
  if (errCount > 0) pills.push(`<span class="pill pill-red">&#9888; ${errCount} issue${errCount !== 1 ? 's' : ''}</span>`);
  if (calls.length === 0) pills.push(`<span class="pill pill-gray">No calls</span>`);

  const callsHtml = calls.length > 0
    ? calls.map((c, i) => renderCall(c, runId, i)).join('')
    : `<div style="padding:16px 20px 16px 42px;font-size:13px;color:#9ca3af;">No calls processed in this run.</div>`;

  return `
    <div class="run-card">
      <div class="run-header" onclick="toggleRun('${bodyId}','${chevronId}')">
        <div class="run-header-left">
          <div class="run-dot ${dotClass}"></div>
          <div>
            <div class="run-time">${fmtTime(run.timestamp)}</div>
            <div class="run-meta">Window: ${fmtTime(run.window_start)} → ${fmtTime(run.window_end)}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <div class="run-pills">${pills.join('')}</div>
          <span class="chevron" id="${chevronId}">&#9654;</span>
        </div>
      </div>
      <div class="run-body" id="${bodyId}">${callsHtml}</div>
    </div>`;
}

function copyEmailDraft(elementId, btn) {
  const el = document.getElementById(elementId);
  if (!el) return;
  const html = el.innerHTML;
  const text = el.innerText || el.textContent;
  const original = btn.innerHTML;
  const confirm = () => {
    btn.innerHTML = '&#10003; Copied with links!';
    btn.style.background = '#166534';
    setTimeout(() => { btn.innerHTML = original; btn.style.background = '#1a1a2e'; }, 2500);
  };
  try {
    const item = new ClipboardItem({
      'text/html': new Blob([html], {type: 'text/html'}),
      'text/plain': new Blob([text], {type: 'text/plain'})
    });
    navigator.clipboard.write([item]).then(confirm).catch(() => {
      navigator.clipboard.writeText(text).then(confirm);
    });
  } catch(e) {
    navigator.clipboard.writeText(text).then(confirm);
  }
}

function toggleRun(bodyId, chevronId) {
  const body = document.getElementById(bodyId);
  const chevron = document.getElementById(chevronId);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

// -------------------------------------------------------
// Init
// -------------------------------------------------------
function init() {
  renderStats();
  const container = document.getElementById('runs-container');
  if (!RUNS || RUNS.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="icon">&#128336;</div>
        <p>No runs recorded yet. Trigger the GitHub Actions workflow to see activity here.</p>
      </div>`;
    return;
  }
  container.innerHTML = RUNS.map((r, i) => renderRun(r, i)).join('');
}

init();
</script>
