name: Process Gong Calls

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch: # Manual trigger
    inputs:
      backfill_since:
        description: "Backfill: reprocess all calls since this date (YYYY-MM-DD). Leave blank for a normal run."
        required: false
        default: ""

permissions:
  contents: write # Required to commit updated state/last_run.json

jobs:
  process-calls:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run call processor
        env:
          GONG_ACCESS_KEY: ${{ secrets.GONG_ACCESS_KEY }}
          GONG_SECRET: ${{ secrets.GONG_SECRET }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BACKFILL_SINCE: ${{ github.event.inputs.backfill_since }}
        run: node src/main.js

      - name: Commit updated state and dashboard
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git pull --rebase origin main || true
          git add state/last_run.json state/activity_log.json state/processed_calls.json docs/index.html || true
          git diff --staged --quiet || git commit -m "chore: update state and dashboard [skip ci]"
          git push || true
